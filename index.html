<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IRIS Terminal</title>

<style>
body{
margin:0;
background:#08111d;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial,sans-serif;
color:white;
}

.box{
width:420px;
background:#111c2d;
padding:40px;
border-radius:12px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,.6);
}

h1{
color:#67b8ff;
}

input{
width:100%;
padding:14px;
margin-top:20px;
background:#1b2940;
border:none;
border-radius:8px;
color:white;
font-size:18px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:25px;
background:#4da3ff;
border:none;
color:white;
font-size:18px;
border-radius:8px;
cursor:pointer;
}

#error{
margin-top:15px;
color:#ff6666;
}
</style>

</head>

<body>

<div class="box">

<h1>IRIS INTELLIGENCE AGENCY</h1>

<p>Enter Access Code</p>

<input
id="code"
placeholder="Access Code">

<button onclick="verify()">

VERIFY

</button>

<p id="error"></p>

</div>

<script>

function verify(){

let code=document.getElementById("code").value;

if(code==="APRIL2026"){

window.location.href="login.html";

}else{

document.getElementById("error").innerHTML="ACCESS DENIED";

}

}

</script>

</body>
</html>
