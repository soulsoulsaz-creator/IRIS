<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIS Dashboard</title>

<style>

body{
margin:0;
background:#08111d;
color:white;
font-family:Arial,sans-serif;
}

.header{
background:#111c2d;
padding:20px;
border-bottom:2px solid #4da3ff;
text-align:center;
}

.header h1{
margin:0;
color:#67b8ff;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card,.folder{
background:#121c2b;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

.card{
border-left:5px solid #4da3ff;
}

button{
width:100%;
padding:14px;
margin-top:15px;
background:#4da3ff;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2f86e6;
}

.locked{
opacity:.5;
}

</style>

</head>

<body>

<div class="header">

<h1>IRIS INTELLIGENCE AGENCY</h1>

<p id="agent"></p>

</div>

<div class="container">

<div class="card">

<h2>MISSION STATUS</h2>

<p>Operation: <b>BLACK IRIS</b></p>

<p>Clearance: <b>OMEGA</b></p>

<p>Progress: <b>12%</b></p>

</div>

<div class="folder">

<h2>📁 Subject B-001</h2>

<p>Open the first investigation file.</p>

<button onclick="window.location.href='subjectB001.html'">
OPEN FILE
</button>

</div>

<div class="folder locked" id="evidenceFolder">

<h2 id="evidenceTitle">🔒 Evidence Locker 001</h2>

<p id="evidenceText">Locked</p>

<div id="evidenceButton"></div>

</div>

<div class="folder locked">

<h2>🔒 Witness Files</h2>

<p>Locked</p>

</div>

<div class="folder locked">

<h2>🔒 Final Archive</h2>

<p>Locked</p>

</div>

</div>

<script>

const agent = localStorage.getItem("agentName") || "Investigator";

document.getElementById("agent").innerHTML =
"Welcome back, Agent " + agent;

const unlocked = localStorage.getItem("evidence001Unlocked");

if(unlocked === "true"){

document.getElementById("evidenceFolder").classList.remove("locked");

document.getElementById("evidenceTitle").innerHTML =
"📂 Evidence Locker 001";

document.getElementById("evidenceText").innerHTML =
"Recovered Personal Letter";

document.getElementById("evidenceButton").innerHTML = `
<button onclick="window.location.href='evidence001.html'">
OPEN EVIDENCE
</button>
`;

}

</script>

</body>
</html>
