<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IRIS Dashboard</title>

<style>

body{
margin:0;
background:#08111d;
color:white;
font-family:Arial,sans-serif;
}

.header{
background:#111c2d;
padding:25px;
border-bottom:2px solid #4da3ff;
text-align:center;
}

.header h1{
margin:0;
color:#67b8ff;
}

.container{
max-width:900px;
margin:30px auto;
padding:20px;
}

.card{
background:#121c2b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
border-left:5px solid #4da3ff;
}

.folder{
background:#121c2b;
padding:20px;
margin-top:18px;
border-radius:10px;
}

.locked{
opacity:.45;
}

button{
width:100%;
padding:14px;
margin-top:12px;
background:#4da3ff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#2f86e6;
}

.progressBar{
width:100%;
height:16px;
background:#09131f;
border-radius:20px;
overflow:hidden;
margin-top:15px;
}

.progressFill{
height:100%;
width:12%;
background:#4da3ff;
transition:.6s;
}

</style>

</head>
