<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIS Dashboard</title>

<style>

body{
    margin:0;
    background:#08111d;
    color:white;
    font-family:Arial,sans-serif;
}

.header{
    background:#111c2d;
    padding:20px;
    border-bottom:2px solid #4da3ff;
    text-align:center;
}

.header h1{
    color:#67b8ff;
    margin:0;
}

.container{
    max-width:900px;
    margin:30px auto;
    padding:20px;
}

.card{
    background:#121c2b;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    border-left:5px solid #4da3ff;
}

.folder{
    background:#121c2b;
    padding:20px;
    margin-top:15px;
    border-radius:10px;
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    background:#4da3ff;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#2f86e6;
}

.locked{
    opacity:.5;
}

</style>

</head>

<body>

<div class="header">

<h1>IRIS INTELLIGENCE AGENCY</h1>

<p id="agent"></p>

</div>

<div class="container">

<div class="card">

<h2>MISSION STATUS</h2>

<p>Operation: <b>BLACK IRIS</b></p>

<p>Clearance: <b>OMEGA</b></p>

<p>Progress: <b>12%</b></p>

</div>

<div class="folder">

<h2>📁 Subject B-01</h2>

<p>Open the first investigation file.</p>

<button onclick="alert('Case 2 is coming soon!')">
OPEN FILE
</button>

</div>

<div class="folder locked">

<h2>🔒 Evidence Locker</h2>

<p>Locked</p>

</div>

<div class="folder locked">

<h2>🔒 Witness Files</h2>

<p>Locked</p>

</div>

<div class="folder locked">

<h2>🔒 Final Archive</h2>

<p>Locked</p>

</div>

</div>

<script>

const agent = localStorage.getItem("agentName") || "Investigator";

document.getElementById("agent").innerHTML =
"Welcome back, Agent " + agent;

</script>

</body>
</html>
